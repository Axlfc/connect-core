<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Setup cognito-stack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <h1 class="mb-4">Asistente de configuración</h1>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="post">
        <div class="mb-3">
          <label class="form-label">Selecciona el perfil de hardware</label>
          <select name="profile" class="form-select">
            <option value="cpu">CPU (por defecto)</option>
            <option value="gpu-nvidia">GPU NVIDIA</option>
            <option value="gpu-amd">GPU AMD</option>
          </select>
        </div>
        <button class="btn btn-primary" type="submit">Generar .env</button>
        <a class="btn btn-secondary ms-2" href="/download">Descargar .env</a>
      </form>

      {% if generated %}
        <hr>
        <h5>Contenido generado (.env)</h5>
        <pre class="p-3 bg-white border rounded" style="white-space:pre-wrap;">{{ generated }}</pre>
      {% endif %}
    </div>
  </body>
</html>
