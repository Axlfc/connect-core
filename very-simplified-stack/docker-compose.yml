version: '3.8'

volumes:
  postgres_storage:
  qdrant_storage:
  comfyui_local:
  comfyui_config:
  redis_data:
  whisper_models:
  kokoro_models:
  forgejo_data:
  certs:
  confd:
  vhostd:
  html:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
  ai:
    driver: bridge
    internal: true

services:
  # Base de Datos
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    restart: unless-stopped
    networks:
      - backend
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-admin_password}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Base de Datos Vectorial
  qdrant:
    build:
      context: ./qdrant
    image: local/qdrant:custom
    container_name: qdrant
    restart: unless-stopped
    networks:
      - frontend
      - backend
      - ai
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage

  # El Cerebro (Backend)
  cognito-backend:
    build:
      context: ./cognito-backend
      dockerfile: Dockerfile
    container_name: cognito-backend
    restart: unless-stopped
    networks:
      - frontend
      - ai
      - backend
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_API_URL=${OLLAMA_API_URL:-http://host.docker.internal:11434/api/generate}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3.5:9b}
      - QDRANT_URL=http://qdrant:6333
      - PYTHONPATH=/app
    volumes:
      - ./cognito-backend:/app

  # Voz (Kokoro)
  kokoro-tts:
    build:
      context: ./kokoro
      dockerfile: Dockerfile
    image: local/kokoro-blackwell:latest
    container_name: kokoro-tts
    restart: unless-stopped
    profiles: ["gpu-nvidia", "voice"]
    networks:
      - ai
      - frontend
    ports:
      - "8880:8880"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PYTHONPATH=/app
    volumes:
      - ./shared:/audio
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 4gb

  # Whisper STT
  whisper-stt:
    build:
      context: ./whisper
      dockerfile: Dockerfile
    image: local/whisper-blackwell:latest
    container_name: whisper-stt
    restart: unless-stopped
    profiles: ["gpu-nvidia", "voice"]
    networks:
      - ai
      - frontend
    ports:
      - "9001:9000"
    environment:
      # - ASR_MODEL=${ASR_MODEL:-large-v3}
      - ASR_MODEL=medium
      - NVIDIA_VISIBLE_DEVICES=all
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    volumes:
      - ./data/whisper:/home/whisper/.cache/whisper
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Redis (Cache)
  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - backend
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_password}
    volumes:
      - ./data/redis:/data
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redis_password}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]

  # Git Hosting
  forgejo:
    image: codeberg.org/forgejo/forgejo:7
    container_name: forgejo
    restart: unless-stopped
    networks:
      - frontend
      - backend
    ports:
      - "3002:3000"
    volumes:
      - ./data/forgejo:/data
    depends_on:
      postgres:
        condition: service_healthy
