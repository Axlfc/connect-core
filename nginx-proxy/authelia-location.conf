# This file is managed by the Jules agent. Do not edit manually.
# Contains the common configuration for Authelia integration with nginx-proxy.

# The /authelia location is an internal endpoint used by nginx to verify authentication.
location /authelia {
    internal;
    proxy_pass http://authelia:9091/api/verify?rd=$scheme://$http_host$request_uri;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";

    # Required headers for Authelia.
    proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-URI $request_uri;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
}
