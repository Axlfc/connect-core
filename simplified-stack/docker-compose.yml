x-ollama-env: &ollama-env
  OLLAMA_HOST: "0.0.0.0:11434"
  OLLAMA_MODEL_1: "${OLLAMA_MODEL_1:-llama3:8b}"
  OLLAMA_MODEL_2: "${OLLAMA_MODEL_2:-nomic-embed-text}"

x-ollama: &service-ollama
  build:
    context: ./ollama
  restart: unless-stopped
  networks:
    - frontend
    - backend
    - ai
  hostname: ollama
  environment:
    <<: *ollama-env
  volumes:
    - ./data/ollama:/root/.ollama
  healthcheck:
    test: ["CMD-SHELL", "ollama list || exit 1"]
    interval: 30s
    timeout: 30s
    retries: 5
    start_period: 120s

services:
  # ========================================
  # POSTGRESQL - Vector-enabled Database
  # ========================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    profiles: ["minimal"]
    restart: unless-stopped
    networks:
      - backend
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-admin_password}
      - POSTGRES_DB=${POSTGRES_DB:-n8n}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # REDIS - Cache & Session Store
  # ========================================
  redis:
    image: redis:7.2-alpine
    container_name: redis
    profiles: ["minimal"]
    restart: unless-stopped
    networks:
      - backend
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_password}
    volumes:
      - ./data/redis:/data
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redis_password}"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # DRUPAL - Main Orchestration System
  # ========================================
  drupal:
    image: drupal:10-apache
    container_name: drupal
    profiles: ["cms"]
    restart: unless-stopped
    networks:
      - frontend
      - backend
    ports:
      - "${DRUPAL_PORT:-8080}:80"
    environment:
      - DRUPAL_DB_TYPE=pgsql
      - DRUPAL_DB_HOST=postgres
      - DRUPAL_DB_PORT=5432
      - DRUPAL_DB_USER=${POSTGRES_USER:-admin}
      - DRUPAL_DB_PASSWORD=${POSTGRES_PASSWORD:-admin_password}
      - DRUPAL_DB_NAME=drupal
    volumes:
      - ./data/drupal/modules:/var/www/html/modules
      - ./data/drupal/sites:/var/www/html/sites
      - ./data/drupal/themes:/var/www/html/themes
      - ./shared:/var/www/html/sites/default/files/shared
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 512M

  # ========================================
  # FORGEJO - Git Hosting
  # ========================================
  forgejo:
    image: codeberg.org/forgejo/forgejo:7
    container_name: forgejo
    profiles: ["git"]
    restart: unless-stopped
    networks:
      - frontend
      - backend
    ports:
      - "${FORGEJO_PORT:-3002}:3000"
      - "${FORGEJO_SSH_PORT:-2222}:22"
    environment:
      - USER_UID=${PUID:-1000}
      - USER_GID=${PGID:-1000}
      - FORGEJO__database__DB_TYPE=postgres
      - FORGEJO__database__HOST=postgres:5432
      - FORGEJO__database__NAME=forgejo
      - FORGEJO__database__USER=${POSTGRES_USER:-admin}
      - FORGEJO__database__PASSWD=${POSTGRES_PASSWORD:-admin_password}
      - FORGEJO__server__DOMAIN=localhost
      - FORGEJO__server__SSH_DOMAIN=localhost
      - FORGEJO__server__ROOT_URL=http://localhost:${FORGEJO_PORT:-3002}/
    volumes:
      - ./data/forgejo:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # ========================================
  # OBSIDIAN - Knowledge Management
  # ========================================
  obsidian:
    image: lscr.io/linuxserver/obsidian:latest
    container_name: obsidian
    profiles: ["knowledge"]
    restart: unless-stopped
    networks:
      - frontend
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ./data/obsidian:/config
      - ./shared:/vaults/shared
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # ========================================
  # QDRANT - Vector Database
  # ========================================
  qdrant:
    build:
      context: ./qdrant
    image: local/qdrant:custom
    container_name: qdrant
    profiles: ["minimal"]
    restart: unless-stopped
    networks:
      - backend
      - ai
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ========================================
  # OLLAMA - Local LLM Engine
  # ========================================

  # NVIDIA Variant
  ollama-nvidia:
    <<: *service-ollama
    image: local/ollama:nvidia
    container_name: ollama-nvidia
    profiles: ["minimal-nvidia"]
    environment:
      <<: *ollama-env
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          cpus: '4.0'
          memory: 8G

  # AMD Variant
  ollama-amd:
    <<: *service-ollama
    build:
      context: ./ollama
      args:
        BASE_IMAGE: ollama/ollama:rocm
    image: local/ollama:amd
    container_name: ollama-amd
    profiles: ["minimal-amd"]
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G

  # CPU Variant
  ollama-cpu:
    <<: *service-ollama
    image: local/ollama:cpu
    container_name: ollama-cpu
    profiles: ["minimal-cpu"]
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G

  # ========================================
  # COMFYUI - AI Image Generation
  # ========================================

  # NVIDIA Variant
  comfyui-nvidia:
    build:
      context: ./comfyui
      args:
        BASE_IMAGE: ghcr.io/ai-dock/comfyui:latest
        TORCH_INDEX_URL: https://download.pytorch.org/whl/cu121
    image: local/comfyui:nvidia
    container_name: comfyui-nvidia
    restart: unless-stopped
    profiles: ["creative-nvidia"]
    networks:
      - frontend
      - ai
    ports:
      - "8188:8188"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics,video
      - WEB_ENABLE_AUTH=false
    volumes:
      - ./data/comfyui/workspace:/workspace/storage
      - ./data/comfyui/models:/opt/ComfyUI/models
      - ./shared:/opt/ComfyUI/input
      - ./shared:/opt/ComfyUI/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          cpus: '4.0'
          memory: 16G

  # AMD Variant
  comfyui-amd:
    build:
      context: ./comfyui
      args:
        BASE_IMAGE: ghcr.io/ai-dock/comfyui:rocm-6.0-py3.10-20240409
        TORCH_INDEX_URL: https://download.pytorch.org/whl/rocm6.0
    image: local/comfyui:amd
    container_name: comfyui-amd
    restart: unless-stopped
    profiles: ["creative-amd"]
    networks:
      - frontend
      - ai
    ports:
      - "8188:8188"
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    environment:
      - WEB_ENABLE_AUTH=false
    volumes:
      - ./data/comfyui/workspace:/workspace/storage
      - ./data/comfyui/models:/opt/ComfyUI/models
      - ./shared:/opt/ComfyUI/input
      - ./shared:/opt/ComfyUI/output
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 16G

  # ========================================
  # n8n - Workflow Automation
  # ========================================
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    profiles: ["minimal"]
    restart: unless-stopped
    networks:
      - frontend
      - backend
      - ai
    ports:
      - "5678:5678"
      - "5679:5679"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-admin}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-admin_password}
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_RUNNERS_ENABLED=true
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - OLLAMA_API_URL=http://ollama:11434
    volumes:
      - ./data/n8n:/home/node/.n8n
      - ./shared:/data/shared
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5678/healthz', (res) => { if (res.statusCode === 200) process.exit(0); else process.exit(1); })\""]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          memory: 1G

  # ========================================
  # n8n RUNNER - Isolated Script Execution
  # ========================================
  n8n-runner:
    build:
      context: ./n8n
    image: local/n8n-runner:custom
    container_name: n8n-runner
    profiles: ["minimal"]
    restart: unless-stopped
    networks:
      - backend
      - ai
    environment:
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN}
    depends_on:
      n8n:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 512M

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
  ai:
    driver: bridge
    internal: true
