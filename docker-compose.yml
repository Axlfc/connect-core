##############################
# Shared volumes & networks
##############################
volumes:
  libretranslate-models:
  languagetool-config:
  n8n_storage:
  postgres_storage:
  ollama_storage:
  qdrant_storage:
  comfyui_local:
  comfyui_config:
  redis_data:
  matrix_data:
  matrix_postgres:
  certs:
  confd:
  vhostd:
  html:
  whisper_models:
  kokoro_models:
  forgejo_data:
  forgejo_db_data:
  forgejo_logs:
  duplicati_config:
  uptime_kuma_data:
  prometheus_data:
  grafana_data:
  cadvisor_data:
  alertmanager_data:
  loki_data:
  promtail_config:


networks:
  frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  backend:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.21.0.0/24
  ai:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.22.0.0/24
  monitoring:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.23.0.0/24

##############################
# Docker Secrets
##############################
