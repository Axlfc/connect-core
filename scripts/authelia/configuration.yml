---
theme: dark
default_2fa_method: ""

server:
  host: 0.0.0.0
  port: 9091
  path: ""
  asset_path: /config/assets/
  headers:
    csp_template: ""
  buffers:
    read: 4096
    write: 4096
  timeouts:
    read: 6s
    write: 6s
    idle: 30s
  endpoints:
    enable_pprof: false
    enable_expvars: false
    authz:
      forward-auth:
        implementation: ForwardAuth
        authn_strategies:
          - name: HeaderProxyAuthorization
            schemes:
              - Basic
          - name: CookieSession
        
log:
  level: info
  format: text
  file_path: ""
  keep_stdout: true

telemetry:
  metrics:
    enabled: false
    address: tcp://0.0.0.0:9959
    buffers:
      read: 4096
      write: 4096
    timeouts:
      read: 6s
      write: 6s
      idle: 30s

totp:
  disable: false
  issuer: authelia.com
  algorithm: sha1
  digits: 6
  period: 30
  skew: 1
  secret_size: 32

webauthn:
  disable: true

ntp:
  address: "time.cloudflare.com:123"
  version: 4
  max_desync: 3s
  disable_startup_check: false
  disable_failure: false

authentication_backend:
  password_reset:
    disable: false
  refresh_interval: 5m
  
  file:
    path: /config/users_database.yml
    password:
      algorithm: argon2
      argon2:
        variant: argon2id
        iterations: 3
        memory: 65536
        parallelism: 4
        key_length: 32
        salt_length: 16

access_control:
  default_policy: deny
  
  rules:
    # Authelia portal
    - domain: auth.localhost
      policy: bypass
    
    # Public webhooks
    - domain: n8n.localhost
      resources:
        - "^/webhook.*$"
        - "^/webhook-test.*$"
      policy: bypass
    
    # Protected services - require authentication
    - domain:
        - n8n.localhost
        - comfyui.localhost
        - status.localhost
        - monitoring.localhost
        - git.localhost
        - ollama.localhost
        - libretranslate.localhost
        - languagetool.localhost
      policy: one_factor

session:
  name: authelia_session
  domain: localhost
  same_site: lax
  expiration: 1h
  inactivity: 5m
  remember_me: 1M
  
  cookies:
    - domain: localhost
      authelia_url: https://auth.localhost
      default_redirection_url: https://n8n.localhost

  redis:
    host: redis
    port: 6379
    database_index: 0

regulation:
  max_retries: 3
  find_time: 2m
  ban_time: 5m

storage:
  local:
    path: /config/db.sqlite3

notifier:
  disable_startup_check: false
  smtp:
    host: smtp.tinet.cat
    port: 465
    timeout: 5s
    username: your-email@example.com
    sender: "Authelia <noreply@example.com>"
    identifier: auth.localhost
    subject: "[Authelia] {title}"
    startup_check_address: test@authelia.com
    disable_require_tls: false
    disable_html_emails: false
    tls:
      server_name: smtp.tinet.cat
      skip_verify: false
      minimum_version: TLS1.2
      maximum_version: TLS1.3
