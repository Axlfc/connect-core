name: Build & Push Docker Images

on:
  push:
    branches: [ master ]
    paths:
      - 'Dockerfile*'
      - '*.sh'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'Dockerfile*'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      push_images:
        description: 'Push images to registry'
        required: false
        default: 'false'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ========================================
  # Build Test (Pull Requests)
  # ========================================
  build-test:
    name: Build Test - Docker Images
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        dockerfile:
          - Dockerfile.n8n
          - Dockerfile.runners
          - Dockerfile.comfyui
          - Dockerfile.matrix
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build ${{ matrix.dockerfile }}
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test-${{ matrix.dockerfile }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========================================
  # Build & Push (Main branch only)
  # ========================================
  build-push:
    name: Build & Push - ${{ matrix.image }}
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    strategy:
      matrix:
        include:
          - dockerfile: Dockerfile.n8n
            image: n8n
          - dockerfile: Dockerfile.runners
            image: runners
          - dockerfile: Dockerfile.comfyui
            image: comfyui
          - dockerfile: Dockerfile.matrix
            image: matrix
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=${{ matrix.image }}-
            type=raw,value=${{ matrix.image }}-latest

      - name: Build and push ${{ matrix.dockerfile }}
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.image }}-latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.image }}-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========================================
  # Docker Compose Validation
  # ========================================
  validate-compose:
    name: Validate Docker Compose with Built Images
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Validate compose file
        run: |
          docker compose config --quiet && echo "✓ docker-compose.yml is valid"

      - name: List services
        run: |
          echo "Services in docker-compose.yml:"
          docker compose config --quiet | grep "^  [a-z]" | wc -l | xargs echo "Total:"

  # ========================================
  # Build Summary
  # ========================================
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-test, run-pytest]
    if: always()
    steps:
      - name: Check build status
        run: |
          echo "Build Summary:"
          echo "- Build Test: ${{ needs.build-test.result }}"
          echo "- Pytest: ${{ needs.run-pytest.result }}"

  # ========================================
  # Pytest for MCP Server
  # ========================================
  run-pytest:
    name: Run Pytest - MCP Server
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    # Inicia los servicios necesarios para las pruebas de integración
    services:
      qdrant:
        image: qdrant/qdrant:v1.9.2
        ports:
          - 6333:6333
        environment:
          QDRANT__SERVICE__GRPC_PORT: "6334"

      ollama:
        image: ollama/ollama:0.2.0
        ports:
          - 11434:11434
        # GPU no está disponible en los runners de GitHub por defecto, se ejecuta en modo CPU

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install uv (Python Package Installer)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          source $HOME/.cargo/env

      - name: Install Dependencies & Run Tests
        env:
          # Las pruebas necesitan saber dónde encontrar los servicios
          # El hostname es el nombre del servicio definido en la sección 'services'
          QDRANT_URL: http://localhost:6333
          OLLAMA_URL: http://localhost:11434
        run: |
          # Instalar dependencias del proyecto y de prueba
          pip install uv
          uv venv
          source .venv/bin/activate
          uv pip install -e "mcp-server.[dev]"
          uv pip install pytest pytest-asyncio httpx qdrant-client

          # Esperar a que los servicios estén listos
          pip install requests
          python -c "import requests, time; \
            urls = ['http://localhost:11434', 'http://localhost:6333/dashboard']; \
            for url in urls: \
                for i in range(30): \
                    try: \
                        r = requests.get(url, timeout=5); \
                        if r.status_code == 200: print(f'✓ {url} is up'); break; \
                    except: pass; \
                    print(f'Waiting for {url}...'); time.sleep(2); \
                else: raise Exception(f'Service {url} timed out')"

          # Ejecutar Pytest
          python -m pytest mcp-server/tests/
